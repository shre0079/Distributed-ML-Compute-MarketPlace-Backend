#spring.datasource.url=jdbc:postgresql://localhost:5432/dcm
#spring.datasource.username=postgres
#spring.datasource.password=admin

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration

server.port=${PORT:8080}

spring.servlet.multipart.max-file-size=1020MB
spring.servlet.multipart.max-request-size=1024MB

#app.base-url=http://localhost:8080
app.base-url=${APP_BASE_URL}

jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

logging.level.com.dcm.backend.demo=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n