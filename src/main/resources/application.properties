spring.datasource.url=jdbc:postgresql://localhost:5432/dcm
spring.datasource.username=postgres
spring.datasource.password=admin

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#spring.flyway.enabled=true
#spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=1020MB
spring.servlet.multipart.max-request-size=1024MB

app.base-url=http://localhost:8080

jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

logging.level.com.dcm.backend.demo=INFO
logging.pattern.console=%d{HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n